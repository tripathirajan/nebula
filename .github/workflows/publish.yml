name: Publish Package
run-name: "Publish - manual"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for Nx release"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      tag:
        description: "Optional npm dist-tag"
        required: false
        default: latest
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: "publish-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  publish:
    name: Version, tag, and publish workspace packages
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version packages with Nx
        run: pnpm nx release version "${{ github.event.inputs.bump }}" --yes

      - name: Publish packages with Nx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm nx release publish --yes --tag "${{ github.event.inputs.tag }}"
