name: Publish Package
run-name: "Publish - manual"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for Nx release"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      preid:
        description: "Prerelease identifier (only applied when bump is 'prerelease', e.g. beta -> 0.2.0-beta.0)"
        required: false
        default: beta
        type: string
      tag:
        description: "Optional npm dist-tag"
        required: false
        default: latest
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: "publish-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  publish:
    name: Version, tag, and publish workspace packages
    runs-on: ubuntu-latest
    environment: npm
    env:
      # See ci.yml — authenticates `nx release`'s underlying `build` step
      # against Nx Cloud for remote caching; harmless no-op if unset.
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version packages with Nx
        run: pnpm nx release version "${{ github.event.inputs.bump }}" --preid "${{ github.event.inputs.preid }}"

      - name: Commit version bump
        # `nx release version` (run standalone, not via the full `nx release`
        # orchestrator) only stages the package.json changes — it does not
        # commit them. Without this step the bump lives only in this run's
        # ephemeral working directory: `git push` later finds nothing to
        # push, so every subsequent run recomputes the exact same version
        # number, which already exists on the registry, and publish becomes
        # a silent no-op (just re-tagging the old version) instead of an
        # error or a real new release.
        run: |
          git add -A
          git commit -m "chore(release): version bump to ${{ github.event.inputs.bump }} (${{ github.event.inputs.preid }})"

      - name: Build packages
        run: pnpm build

      - name: Publish packages with Nx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm nx release publish --yes --tag "${{ github.event.inputs.tag }}"

      - name: Push version commit and tags
        # Runs only once publish actually succeeds, so a build/publish
        # failure never leaves a version bump committed to git for
        # something that was never really published. This step is what
        # actually persists the bump from "Commit version bump" above —
        # without it (as originally shipped), the commit stayed local to
        # the runner and every subsequent run recomputed the exact same
        # version number nx read from package.json, which had never
        # changed on the real `main` branch.
        run: git push --follow-tags
