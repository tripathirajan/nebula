name: Publish Package
run-name: "Publish - manual"

# Dispatch this against the `release` branch, not `main`. `main`'s
# branch protection requires a PR review for every push, which
# github-actions[bot] can't satisfy (enforce_admins only exempts human
# admins) — the "Push version commit and tags" step below would fail
# every time on `main` (confirmed: GH006 "Protected branch update
# failed"). `release` has no protection rule, so the bot can push its
# own version-bump commits and tags directly. See CONTRIBUTING.md's
# "Publishing" section for the full release/hotfix flow.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for Nx release"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      preid:
        description: "Prerelease identifier (only applied when bump is 'prerelease', e.g. beta -> 0.2.0-beta.0)"
        required: false
        default: beta
        type: string
      tag:
        description: "Optional npm dist-tag"
        required: false
        default: latest
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: "publish-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  publish:
    name: Version, tag, and publish workspace packages
    runs-on: ubuntu-latest
    environment: npm
    env:
      # See ci.yml — authenticates `nx release`'s underlying `build` step
      # against Nx Cloud for remote caching; harmless no-op if unset.
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version packages with Nx
        # `nx release version` (run standalone, not via the full `nx
        # release` orchestrator) only stages the package.json changes —
        # it does not commit them. That's fine: build/publish below read
        # the bumped versions straight off disk, and "Generate changelog
        # and tag release" further down commits both this version bump
        # and the changelog files together in one commit, once publish
        # has actually succeeded.
        run: pnpm nx release version "${{ github.event.inputs.bump }}" --preid "${{ github.event.inputs.preid }}"

      - name: Build packages
        run: pnpm build

      - name: Publish packages with Nx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm nx release publish --yes --tag "${{ github.event.inputs.tag }}"

      - name: Generate changelog and tag release
        # Runs only once publish actually succeeds, so a build/publish
        # failure never leaves a version bump or changelog committed for
        # something that was never really published. Every package in
        # this workspace is bumped together in practice (even though
        # they're versioned independently), so `react-ui`'s resulting
        # version is a representative label for the changelog entries —
        # each package's own changelog content is still scoped correctly
        # from its own git history regardless. This also creates the git
        # tags nx release version doesn't create on its own (confirmed:
        # this repo had zero tags before the first real v1.0.0 release).
        # Doesn't push yet — the next step does that once this succeeds.
        run: |
          VERSION=$(node -p "require('./packages/react-ui/package.json').version")
          pnpm nx release changelog "$VERSION" --git-push=false

      - name: Push version commit, changelog, and tags
        run: git push --follow-tags
