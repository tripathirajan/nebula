name: Storybook
run-name: ${{ github.event_name == 'pull_request' && format('Storybook — PR#{0} — run #{1} — {2}', github.event.pull_request.number, github.run_number, substr(github.sha, 0, 7)) || format('Storybook — {0} — run #{1} — {2}', github.ref_name, github.run_number, substr(github.sha, 0, 7)) }}

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-storybook:
    name: Build and publish Storybook to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
